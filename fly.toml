# fly.toml app configuration file generated for wanderdog on 2026-04-14T09:00:15+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wanderdog'
primary_region = 'iad'

[build]

[env]
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
